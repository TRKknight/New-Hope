<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive physiology widget for browsing and quizzing named laws, effects, syndromes, reflexes, and clinical signs."
    />
    <script>
      (() => {
        const storageKey = "new-hope-theme";
        const savedTheme = localStorage.getItem(storageKey);
        const systemTheme = matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
        const theme =
          savedTheme === "light" || savedTheme === "dark" ? savedTheme : systemTheme;

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <title>New Hope Physiology Widget</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
